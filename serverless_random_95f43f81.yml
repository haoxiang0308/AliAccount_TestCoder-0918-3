service: my-nodejs-service

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  memorySize: 128
  timeout: 10
  environment:
    AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'

functions:
  hello:
    handler: handler.hello
    events:
      - http:
          path: hello
          method: get
          cors: true

plugins:
  - serverless-offline

package:
  exclude:
    - node_modules/**
    - .git/**
    - .serverless/**
    - README.md