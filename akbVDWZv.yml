# This is a basic GitLab CI configuration file
# It defines a pipeline with one job that runs tests

stages:
  - test

variables:
  # Define any variables needed for the pipeline
  PYTHON_VERSION: "3.9"

# Job to run tests
test_job:
  stage: test
  image: python:$PYTHON_VERSION
  before_script:
    - pip install -r requirements.txt
  script:
    - python -m pytest tests/ -v
  after_script:
    - echo "Tests completed"
  only:
    - main
    - merge_requests