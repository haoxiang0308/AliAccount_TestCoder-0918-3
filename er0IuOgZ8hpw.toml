# Конфигурация приложения

[server]
host = "localhost"
port = 8080
debug = false

[database]
host = "localhost"
port = 5432
name = "myapp_db"
user = "admin"
password = "secret123"
ssl_mode = "require"

[cache]
type = "redis"
host = "localhost"
port = 6379
ttl = 3600

[features]
enable_logging = true
enable_metrics = false
max_connections = 100

[secrets]
jwt_secret = "supersecretkey"
api_key = "abcdef123456"

[limits]
max_file_size = "10MB"
max_request_timeout = "30s"
rate_limit = 1000