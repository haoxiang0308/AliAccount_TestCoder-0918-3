# Application Configuration
title = "My Application Settings"

[app]
name = "Sample App"
version = "1.0.0"
debug = true

[database]
host = "localhost"
port = 5432
name = "myapp_db"
username = "db_user"
password = "secure_password"

[server]
host = "0.0.0.0"
port = 8080
timeout = 30

[logging]
level = "info"
file = "app.log"
max_size = "10MB"
max_backups = 3