# Конфигурация приложения
title = "Конфигурация приложения"

[database]
host = "localhost"
port = 5432
name = "myapp_db"
username = "admin"
password = "secret"
ssl_enabled = true

[server]
host = "0.0.0.0"
port = 8080
timeout = 30
debug = false

[logging]
level = "info"
format = "json"
output = "stdout"

[features]
enable_cache = true
max_connections = 100
rate_limit = 1000

[api]
version = "v1"
base_url = "/api"
authentication_required = true

[api.oauth]
client_id = "sample_client_id"
client_secret = "sample_client_secret"
redirect_uri = "http://localhost:8080/callback"

[cache]
type = "redis"
host = "redis-server"
port = 6379
ttl = 3600

[cache.redis]
cluster_mode = false
max_memory = "256mb"

[security]
jwt_secret = "super_secret_jwt_key"
allowed_origins = ["http://localhost:3000", "https://myapp.com"]
csrf_enabled = true

[security.encryption]
algorithm = "AES-256-GCM"
key_length = 256