syntax = "proto3";

package profile;

// Сообщение для запроса профиля
message ProfileRequest {
  string user_id = 1;
}

// Сообщение профиля пользователя
message Profile {
  string user_id = 1;
  string name = 2;
  string email = 3;
  int32 age = 4;
  string bio = 5;
}

// Ответ с профилем
message ProfileResponse {
  Profile profile = 1;
  bool success = 2;
  string error_message = 3;
}

// Сервис для работы с профилями
service ProfileService {
  // Получить профиль пользователя
  rpc GetProfile(ProfileRequest) returns (ProfileResponse);
  // Сохранить профиль пользователя
  rpc SaveProfile(Profile) returns (ProfileResponse);
}
