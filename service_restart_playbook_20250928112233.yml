---
# Ansible playbook to restart a service
- name: Restart a service
  hosts: localhost
  become: yes
  tasks:
    - name: Restart the specified service
      ansible.builtin.systemd:
        name: "{{ service_name | default('nginx') }}"
        state: restarted
      notify: wait for service

    - name: Wait for the service to be active
      ansible.builtin.wait_for:
        path: /var/run/{{ service_name | default('nginx') }}.pid
        state: present
        timeout: 30
      delegate_to: localhost

  handlers:
    - name: wait for service
      ansible.builtin.pause:
        seconds: 5