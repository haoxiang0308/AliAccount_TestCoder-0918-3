syntax = "proto3";

package status;

// 定义状态码枚举
enum StatusCode {
  // 成功状态
  SUCCESS = 0;
  
  // 通用错误状态
  ERROR = 1;
  INVALID_ARGUMENT = 2;
  NOT_FOUND = 3;
  PERMISSION_DENIED = 4;
  UNAUTHENTICATED = 5;
  UNIMPLEMENTED = 6;
  INTERNAL_ERROR = 7;
  UNAVAILABLE = 8;
  TIMEOUT = 9;
  
  // 业务相关状态
  USER_NOT_EXISTS = 100;
  USER_ALREADY_EXISTS = 101;
  INVALID_CREDENTIALS = 102;
  ACCOUNT_LOCKED = 103;
  
  // 数据库相关状态
  DATABASE_ERROR = 200;
  CONNECTION_FAILED = 201;
  
  // 网络相关状态
  NETWORK_ERROR = 300;
  REQUEST_TIMEOUT = 301;
}