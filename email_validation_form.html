<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма с валидацией email</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .form-container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #4CAF50;
            outline: none;
        }
        input.valid {
            border-color: #4CAF50;
        }
        input.invalid {
            border-color: #f44336;
        }
        .error-message {
            color: #f44336;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .submit-btn:hover {
            background-color: #45a049;
        }
        .submit-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Форма регистрации</h2>
        <form id="registrationForm">
            <div class="form-group">
                <label for="name">Имя:</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <div id="emailError" class="error-message">Пожалуйста, введите корректный email адрес</div>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">Отправить</button>
        </form>
    </div>

    <script>
        // Получаем элементы формы
        const emailInput = document.getElementById('email');
        const emailError = document.getElementById('emailError');
        const submitBtn = document.getElementById('submitBtn');
        const form = document.getElementById('registrationForm');

        // Функция для проверки валидности email
        function validateEmail(email) {
            // Простая регулярка для проверки email
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        // Функция для обновления стиля поля email
        function updateEmailField() {
            if (emailInput.value === '') {
                // Если поле пустое, убираем классы и скрываем ошибку
                emailInput.className = '';
                emailError.style.display = 'none';
                submitBtn.disabled = false;
            } else if (validateEmail(emailInput.value)) {
                // Если email валидный
                emailInput.className = 'valid';
                emailError.style.display = 'none';
                submitBtn.disabled = false;
            } else {
                // Если email невалидный
                emailInput.className = 'invalid';
                emailError.style.display = 'block';
                submitBtn.disabled = true;
            }
        }

        // Добавляем обработчик события input для поля email
        emailInput.addEventListener('input', updateEmailField);

        // Добавляем обработчик события submit для формы
        form.addEventListener('submit', function(e) {
            // Проверяем валидность email при отправке формы
            if (!validateEmail(emailInput.value)) {
                e.preventDefault(); // Предотвращаем отправку формы
                emailInput.className = 'invalid';
                emailError.style.display = 'block';
                submitBtn.disabled = true;
            } else {
                // Форма валидна, можно отправлять
                alert('Форма успешно отправлена!');
                // В реальном приложении здесь будет код для отправки данных на сервер
            }
        });
    </script>
</body>
</html>
