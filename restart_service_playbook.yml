---
- name: Restart a service
  hosts: localhost
  become: yes
  tasks:
    - name: Restart the specified service
      ansible.builtin.systemd:
        name: "{{ service_name | default('httpd') }}"
        state: restarted
      notify: Verify service status

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes

  handlers:
    - name: Verify service status
      ansible.builtin.debug:
        msg: "Service {{ service_name | default('httpd') }} has been restarted."