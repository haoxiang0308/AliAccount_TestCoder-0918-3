---
- name: Restart a service
  hosts: localhost
  become: yes
  tasks:
    - name: Restart the specified service
      systemd:
        name: "{{ service_name | default('nginx') }}"
        state: restarted
      notify: Verify service status

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

  handlers:
    - name: Verify service status
      systemd:
        name: "{{ service_name | default('nginx') }}"
        state: started