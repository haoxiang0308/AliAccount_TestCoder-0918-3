---
- name: Restart a service
  hosts: localhost
  become: yes
  tasks:
    - name: Restart the specified service
      systemd:
        name: "{{ service_name | default('httpd') }}"
        state: restarted
      notify: Check service status

    - name: Wait for service to be active
      systemd:
        name: "{{ service_name | default('httpd') }}"
        state: started
      register: service_started
      until: service_started is succeeded
      retries: 5
      delay: 2

  handlers:
    - name: Check service status
      debug:
        msg: "Service {{ service_name | default('httpd') }} has been restarted."