# Application Configuration File

[server]
host = "0.0.0.0"
port = 8080
debug = false

[database]
host = "localhost"
port = 5432
name = "myapp_db"
user = "db_user"
password = "db_password"

[logging]
level = "INFO"
file = "/var/log/myapp.log"

[features]
enable_cache = true
cache_ttl = 3600
max_connections = 100